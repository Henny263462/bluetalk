name: Release Build

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      EP_GH_IGNORE_TIME: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Electron cache paths
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "ELECTRON_CACHE=$env:RUNNER_TEMP\electron-cache"
          Add-Content -Path $env:GITHUB_ENV -Value "ELECTRON_BUILDER_CACHE=$env:RUNNER_TEMP\electron-builder-cache"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore Electron caches
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Force GitHub publish to release (not draft)
        run: node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));const pub=p.build&&p.build.publish;const set=x=>{if(x&&x.provider==='github')x.releaseType='release'};if(Array.isArray(pub))pub.forEach(set);else if(pub)set(pub);fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Build and publish release assets
        run: npx electron-builder --win nsis portable --publish always

      - name: Save Electron caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
